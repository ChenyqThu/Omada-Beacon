<!DOCTYPE html>
<!-- @dsCard group="Brand" name="Buttons — Primary" subtitle="Primary CTA, four states" viewport="700x220" -->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Buttons — Primary</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 22px 24px; }
  .group { display: flex; gap: 12px; align-items: center; margin-bottom: 14px; flex-wrap: wrap; }
  .lab { font-family: var(--font-mono); font-size: 10px; color: var(--fg-tertiary); width: 72px; }
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    font-family: var(--font-sans); font-weight: 500; font-size: 14px; line-height: 1;
    padding: 7px 16px; border-radius: 3px; border: 1px solid transparent;
    cursor: pointer; transition: background 120ms;
  }
  .btn-primary { background: #00A870; color: #fff; }
  .btn-primary.hover { background: #18B782; }
  .btn-primary.press { background: #009765; }
  .btn-primary.disabled { background: #00A870; color: #fff; opacity: 0.4; }
  .btn .ic { width: 14px; height: 14px; display: inline-block; }
  .ic-plus { background: currentColor; -webkit-mask: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><path d='M8 3v10M3 8h10' stroke='black' stroke-width='1.8' stroke-linecap='round'/></svg>") center/contain no-repeat; mask: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><path d='M8 3v10M3 8h10' stroke='black' stroke-width='1.8' stroke-linecap='round'/></svg>") center/contain no-repeat; }
  .ic-loader { border: 1.6px solid rgba(255,255,255,0.35); border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg) } }
</style>
</head>
<body>
  <div class="group"><span class="lab">default</span><button class="btn btn-primary"><span class="ic ic-plus"></span>Button</button><button class="btn btn-primary">Apply</button><button class="btn btn-primary" style="padding:7px 12px"><span class="ic ic-loader"></span></button></div>
  <div class="group"><span class="lab">hover</span><button class="btn btn-primary hover"><span class="ic ic-plus"></span>Button</button><button class="btn btn-primary hover">Apply</button></div>
  <div class="group"><span class="lab">pressed</span><button class="btn btn-primary press"><span class="ic ic-plus"></span>Button</button><button class="btn btn-primary press">Apply</button></div>
  <div class="group"><span class="lab">disabled</span><button class="btn btn-primary disabled"><span class="ic ic-plus"></span>Button</button><button class="btn btn-primary disabled">Apply</button></div>
</body>
</html>
