<!DOCTYPE html>
<!-- @dsCard group="Brand" name="Illustrations" subtitle="82 real Omada spot illustrations — light/dark, from Figma" viewport="900x900" -->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Illustrations</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { width: 900px; padding: 22px 24px; }
  .bar { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
  .bar .t { font-size: 13px; font-weight: 700; color: var(--fg-primary); margin-right: 6px; }
  .bar button { font: inherit; font-size: 11px; padding: 5px 12px; border-radius: 6px; cursor: pointer; border: 1px solid var(--border-default, #ECECEC); background: #fff; color: var(--fg-secondary); }
  .bar button.on { background: var(--omada-green-500, #00A870); color: #fff; border-color: transparent; }
  .bar .count { font-size: 11px; color: var(--fg-tertiary); margin-left: auto; font-family: var(--font-mono); }
  .g { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .c { display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 12px; border: 1px solid var(--border-default, #ECECEC); border-radius: 10px; background: #fff; }
  .c img { width: 100%; height: 96px; object-fit: contain; }
  .c span { font-size: 9.5px; color: var(--fg-tertiary); font-family: var(--font-mono, monospace); text-align: center; }
  body.dark { background: #1D2529; }
  body.dark .c { background: #232E33; border-color: #2F3A40; }
  body.dark .bar .t { color: #E8E8E8; }
  body.dark .bar button { background: #232E33; border-color: #2F3A40; color: #aeb6bb; }
</style>
</head>
<body>
  <div class="bar">
    <span class="t">Omada illustrations</span>
    <button id="bl" class="on">light</button>
    <button id="bd">dark</button>
    <span class="count" id="count">…</span>
  </div>
  <div class="g" id="grid"></div>
  <script src="../antd-omada/components/Illustration/illustrations-omada.js"></script>
  <script>
    const set = window.OMADA_ILLUS_SET || {};
    const keys = Object.keys(set).sort();
    let mode = 'light';
    const grid = document.getElementById('grid');
    function render() {
      grid.innerHTML = keys.map(k => {
        const e = set[k];
        const folder = (mode === 'dark' && e.d) || (!e.l && e.d) ? 'dark' : 'light';
        return `<div class="c"><img src="../antd-omada/assets/illustrations/${folder}/${k}.svg" alt="${k}" loading="lazy"><span>${k}</span></div>`;
      }).join('');
      document.body.classList.toggle('dark', mode === 'dark');
      document.getElementById('bl').classList.toggle('on', mode === 'light');
      document.getElementById('bd').classList.toggle('on', mode === 'dark');
    }
    document.getElementById('count').textContent = keys.length + ' illustrations · ' +
      keys.filter(k => set[k].l && set[k].d).length + ' light+dark';
    document.getElementById('bl').onclick = () => { mode = 'light'; render(); };
    document.getElementById('bd').onclick = () => { mode = 'dark'; render(); };
    render();
  </script>
</body>
</html>
