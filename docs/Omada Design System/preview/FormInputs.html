<!DOCTYPE html>
<!-- @dsCard group="Brand" name="Form Inputs" subtitle="Text, select, switch, checkbox states" viewport="700x280" -->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Form Inputs</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 22px 24px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px 18px; }
  .field { display: flex; flex-direction: column; gap: 5px; }
  .field .lab { font-size: 12px; font-weight: 500; color: var(--fg-primary); }
  .input {
    height: 32px; padding: 0 12px; border-radius: 4px; border: 1px solid var(--border-default); background: #fff;
    font-family: var(--font-sans); font-size: 13px; color: var(--fg-primary); outline: none;
    display: flex; align-items: center; gap: 8px;
  }
  .input:hover { border-color: var(--border-strong); }
  .input.focus { border-color: var(--omada-green-500); box-shadow: 0 0 0 3px rgba(0,168,112,0.12); }
  .input.error { border-color: var(--omada-red); }
  .input.disabled { background: var(--bg-app); color: var(--fg-tertiary); }
  .placeholder { color: var(--fg-tertiary); }
  .chev { margin-left: auto; color: var(--fg-tertiary); }
  .help { font-size: 11px; color: var(--fg-tertiary); }
  .help.err { color: var(--omada-red); }
  .input.select { cursor: pointer; }
  .switch {
    width: 36px; height: 20px; background: var(--omada-green-500); border-radius: 999px; position: relative; display: inline-block;
  }
  .switch::after { content: ''; position: absolute; top: 2px; right: 2px; width: 16px; height: 16px; background: #fff; border-radius: 50%; box-shadow: 0 1px 2px rgba(0,0,0,0.2); }
  .switch.off { background: var(--grey-400); }
  .switch.off::after { right: auto; left: 2px; }
  .checkbox { width: 16px; height: 16px; border: 1.5px solid var(--grey-400); border-radius: 3px; display: inline-block; vertical-align: middle; }
  .checkbox.on { background: var(--omada-green-500); border-color: var(--omada-green-500); position: relative; }
  .checkbox.on::after { content:''; position:absolute; left:3px; top:1px; width:6px; height:9px; border:solid #fff; border-width:0 2px 2px 0; transform: rotate(45deg); }
</style>
</head>
<body>
  <div class="grid">
    <div class="field"><div class="lab">Site Name</div><div class="input"><span class="placeholder">Please enter…</span></div></div>
    <div class="field"><div class="lab">Site Name</div><div class="input focus">New York_1230<span style="flex:1"></span></div><div class="help">Up to 64 characters.</div></div>
    <div class="field"><div class="lab">Device Type</div><div class="input select"><span>All Devices</span><svg class="chev" width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M3 4.5l3 3 3-3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg></div></div>
    <div class="field"><div class="lab">Password</div><div class="input error">••••<span style="flex:1"></span></div><div class="help err">Password must be at least 8 characters.</div></div>
    <div class="field"><div class="lab">Auto-Backup</div><div class="input disabled"><span>Daily at 03:00</span><svg class="chev" width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M3 4.5l3 3 3-3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg></div></div>
    <div class="field">
      <div class="lab">Options</div>
      <div style="display:flex;gap:18px;align-items:center;font-size:13px;color:var(--fg-primary);height:32px">
        <label style="display:flex;align-items:center;gap:8px"><span class="checkbox on"></span>Enable</label>
        <label style="display:flex;align-items:center;gap:8px"><span class="checkbox"></span>Auto-renew</label>
        <span class="switch"></span>
        <span class="switch off"></span>
      </div>
    </div>
  </div>
</body>
</html>
