<!DOCTYPE html>
<!-- @dsCard group="Brand" name="Device-type Icons" subtitle="AP, Switch, Gateway, VIGI, Client, Omada mark" viewport="700x200" -->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Brand Icons — Device Types</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 22px 24px; }
  .row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 14px; }
  .pt {
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    padding: 16px 8px; border-radius: 8px; background: var(--bg-app);
  }
  .pt .sq {
    width: 56px; height: 56px; border-radius: 10px; background: #fff;
    display: flex; align-items: center; justify-content: center;
    border: 1px solid var(--border-default);
  }
  .pt .sq svg { width: 28px; height: 28px; fill: var(--omada-green-500); stroke: var(--omada-green-500); }
  .pt .nm { font-size: 11px; color: var(--fg-primary); font-weight: 600; }
  .pt .ct { font-size: 10px; color: var(--fg-tertiary); }
</style>
</head>
<body>
  <div class="row">
    <div class="pt">
      <div class="sq"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 4v3"/><path d="M5 8c2-2 5-3 7-3s5 1 7 3"/><path d="M7 11c1.5-1.5 3-2 5-2s3.5.5 5 2"/><circle cx="12" cy="14" r="1.6" fill="currentColor"/><rect x="4" y="15" width="16" height="6" rx="1"/></svg></div>
      <div class="nm">Access Point</div><div class="ct">AP</div>
    </div>
    <div class="pt">
      <div class="sq"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="8" width="18" height="9" rx="1.5"/><circle cx="7" cy="13" r="0.8" fill="currentColor"/><circle cx="11" cy="13" r="0.8" fill="currentColor"/><circle cx="15" cy="13" r="0.8" fill="currentColor"/><circle cx="19" cy="13" r="0.8" fill="currentColor"/></svg></div>
      <div class="nm">Switch</div><div class="ct">SW</div>
    </div>
    <div class="pt">
      <div class="sq"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M3 12h18"/><path d="M12 3a14 14 0 010 18M12 3a14 14 0 000 18"/></svg></div>
      <div class="nm">Gateway</div><div class="ct">GW</div>
    </div>
    <div class="pt">
      <div class="sq"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l9-4v14l-9-4z"/><rect x="3" y="9" width="3" height="6" rx="0.5" fill="currentColor"/><circle cx="15" cy="12" r="2" fill="#fff" stroke-width="1.4"/></svg></div>
      <div class="nm">VIGI Camera</div><div class="ct">VIGI</div>
    </div>
    <div class="pt">
      <div class="sq"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="9" r="2.5"/><path d="M5 21c0-4 3-7 7-7s7 3 7 7"/></svg></div>
      <div class="nm">Client</div><div class="ct">user</div>
    </div>
    <div class="pt" style="background:#0A5A5A">
      <div class="sq" style="background:#0A5A5A;border-color:#0A7171"><img src="../assets/omada-mark.svg" style="width:36px;height:36px"/></div>
      <div class="nm" style="color:#fff">Omada</div><div class="ct" style="color:rgba(255,255,255,0.7)">brand mark</div>
    </div>
  </div>
</body>
</html>
