<!DOCTYPE html>
<!-- @dsCard group="Brand" name="Radii" subtitle="Small radii — buttons 3, cards 8, modals 16" viewport="700x200" -->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Radii</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 22px 24px; }
  .row { display: grid; grid-template-columns: repeat(7, 1fr); gap: 14px; }
  .r { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .r .b {
    width: 78px; height: 78px;
    background: linear-gradient(135deg, #ECF8F1, #CFEAD9);
    border: 1px solid #B6DDC7;
  }
  .r .nm { font-family: var(--font-mono); font-size: 10px; color: var(--fg-primary); font-weight: 600; text-align: center; }
  .r .use { font-size: 10px; color: var(--fg-tertiary); text-align: center; line-height: 1.4; }
</style>
</head>
<body>
  <div class="row">
    <div class="r"><div class="b" style="border-radius:2px"></div><div class="nm">2px</div><div class="use">xs<br/>dividers</div></div>
    <div class="r"><div class="b" style="border-radius:3px"></div><div class="nm">3px</div><div class="use">sm<br/>buttons</div></div>
    <div class="r"><div class="b" style="border-radius:4px"></div><div class="nm">4px</div><div class="use">md<br/>inputs, tags</div></div>
    <div class="r"><div class="b" style="border-radius:8px"></div><div class="nm">8px</div><div class="use">lg<br/>cards, menus</div></div>
    <div class="r"><div class="b" style="border-radius:12px"></div><div class="nm">12px</div><div class="use">xl<br/>panels</div></div>
    <div class="r"><div class="b" style="border-radius:16px"></div><div class="nm">16px</div><div class="use">2xl<br/>modals, drawers</div></div>
    <div class="r"><div class="b" style="border-radius:999px"></div><div class="nm">pill</div><div class="use">FAB, avatar<br/>pill tags</div></div>
  </div>
</body>
</html>
