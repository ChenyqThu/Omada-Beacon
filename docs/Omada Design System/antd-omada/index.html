<style>
  body { background: var(--bg-app); font-family: 'Manrope', sans-serif; color: var(--fg-primary); }
  .page { max-width: 1200px; margin: 0 auto; padding: 28px 32px 90px; }

  .hero {
    background: linear-gradient(135deg, #0A5A5A 0%, #00A870 100%);
    color: #fff; border-radius: 14px; padding: 28px 36px; margin-bottom: 24px;
    display: flex; align-items: center; justify-content: space-between; gap: 24px;
  }
  .hero h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.02em; margin: 0 0 6px; }
  .hero p { font-size: 14px; opacity: 0.88; margin: 0; max-width: 560px; line-height: 1.55; }
  .hero .stats { display: flex; gap: 26px; flex-shrink: 0; }
  .hero .stats .s .n { font-size: 26px; font-weight: 700; line-height: 1; }
  .hero .stats .s .l { font-size: 11px; opacity: 0.72; margin-top: 4px; }

  .section { background: #fff; border: 1px solid var(--border-default); border-radius: 12px; padding: 22px 26px; margin-bottom: 18px; }
  .section h2 { font-size: 16px; font-weight: 600; margin: 0 0 4px; color: var(--fg-primary); display: flex; align-items: center; gap: 10px; }
  .section h2 .ix { color: var(--omada-green-500); display: inline-flex; }
  .section .desc { font-size: 12px; color: var(--fg-tertiary); margin-bottom: 18px; }

  .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 14px; }
  .row:last-child { margin-bottom: 0; }
  .row .label { font-family: var(--font-mono); font-size: 10px; color: var(--fg-tertiary); width: 92px; flex-shrink: 0; text-transform: lowercase; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px 28px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px 28px; }

  .toc {
    position: sticky; top: 16px; z-index: 5;
    background: rgba(255,255,255,0.92); backdrop-filter: none;
    border: 1px solid var(--border-default); border-radius: 10px; padding: 12px 16px;
    margin-bottom: 22px; display: flex; flex-wrap: wrap; gap: 6px 14px; font-size: 12px; align-items: center;
  }
  .toc a { color: var(--fg-secondary); text-decoration: none; padding: 3px 9px; border-radius: 6px; }
  .toc a:hover { background: var(--grey-100); color: var(--omada-green-600); }

  .toolbar { display: flex; justify-content: flex-end; gap: 24px; align-items: center; margin-bottom: 16px; }
  .toolbar .tl { display: inline-flex; align-items: center; gap: 8px; font-size: 12px; color: var(--fg-secondary); }

  [data-omada-theme="dark"] .section { background: #1F1F1F; border-color: #333; }
  [data-omada-theme="dark"] .section h2 { color: #E8E8E8; }
  [data-omada-theme="dark"] .section .desc { color: #737373; }
  [data-omada-theme="dark"] .toc { background: rgba(31,31,31,0.92); border-color: #333; }
  [data-omada-theme="dark"] .toc a { color: #A6A6A6; }
  [data-omada-theme="dark"] .toc a:hover { background: #262626; color: #5FD3A6; }
  [data-omada-theme="dark"] .toc strong { color: #E8E8E8 !important; }
  [data-omada-theme="dark"] .row .label { color: #737373; }
</style>

function Section({ s, lang }) {
  const Demo = window.OmadaDemos[s.key];
  return (
    <section className="section" id={s.id}>
      <h2><span className="ix"><Icon name={s.icon} size={18} /></span>{s.title[lang] || s.title.en}</h2>
      <div className="desc">{s.desc[lang] || s.desc.en}</div>
      {Demo ? <Demo /> : <div style={{ color: '#999' }}>—</div>}
    </section>
  );
}

function Toolbar() {
  const { mode, setMode, lang, setLang, dir, setDir } = window.useOmada();
  const L = (en, zh) => (lang === 'zh' ? zh : en);
  return (
    <div className="toolbar">
      <span className="tl">
        <Icon name={mode === 'dark' ? 'moon' : 'sun'} size={14} />
        {L('Theme', '主题')}
        <Radio.Group value={mode} onChange={(e) => setMode(e.target.value)} buttonStyle="solid" size="small">
          <Radio.Button value="light">{L('Light', '浅色')}</Radio.Button>
          <Radio.Button value="dark">{L('Dark', '深色')}</Radio.Button>
        </Radio.Group>
      </span>
      <span className="tl">
        <Icon name="languages" size={14} />
        {L('Language', '语言')}
        <Radio.Group value={lang} onChange={(e) => setLang(e.target.value)} size="small">
          <Radio.Button value="en">EN</Radio.Button>
          <Radio.Button value="zh">中文</Radio.Button>
        </Radio.Group>
      </span>
      <span className="tl">
        <Icon name="globe" size={14} />
        {L('Direction', '方向')}
        <Radio.Group value={dir} onChange={(e) => setDir(e.target.value)} buttonStyle="solid" size="small">
          <Radio.Button value="ltr">LTR</Radio.Button>
          <Radio.Button value="rtl">RTL</Radio.Button>
        </Radio.Group>
      </span>
    </div>
  );
}
