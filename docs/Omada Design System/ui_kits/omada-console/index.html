<!DOCTYPE html>
<!-- @dsCard group="UI Kit — Omada Console" name="Omada Console — UI Kit" subtitle="Interactive console: login → dashboard → devices" viewport="1280x720" -->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Omada Console — UI Kit</title>
<link rel="stylesheet" href="console.css">
<link rel="icon" href="../../assets/omada-app-icon.png">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.469.0/dist/umd/lucide.min.js"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="LoginScreen.jsx"></script>
<script type="text/babel" src="TopBar.jsx"></script>
<script type="text/babel" src="Sidebar.jsx"></script>
<script type="text/babel" src="Dashboard.jsx"></script>
<script type="text/babel" src="DevicesTable.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

function App() {
  const [screen, setScreen] = useState(localStorage.getItem('om.screen') || 'login');
  const [active, setActive] = useState(localStorage.getItem('om.active') || 'dashboard');
  const [product, setProduct] = useState('wireless');
  const site = 'New York · Manhattan HQ';

  useEffect(() => { localStorage.setItem('om.screen', screen); }, [screen]);
  useEffect(() => { localStorage.setItem('om.active', active); }, [active]);

  // Re-create Lucide icons whenever screen changes
  useEffect(() => {
    requestAnimationFrame(() => window.lucide && window.lucide.createIcons());
  });

  if (screen === 'login') {
    return <LoginScreen onSignIn={() => setScreen('console')} />;
  }

  return (
    <div className="app">
      <TopBar
        site={site}
        product={product}
        onProduct={setProduct}
        onMenu={() => setScreen('login')}
      />
      <div className="body">
        <Sidebar activeId={active} onSelect={setActive} site={site}/>
        <main className="main scroll-hide">
          {active === 'dashboard' && <Dashboard product={product}/>}
          {active === 'devices'   && <DevicesTable/>}
          {!['dashboard','devices'].includes(active) && <ComingSoon screen={active}/>}
        </main>
      </div>
    </div>
  );
}

function ComingSoon({ screen }) {
  return (
    <div style={{
      display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
      minHeight: 400, color: 'var(--fg-tertiary)', textAlign: 'center'
    }}>
      <img src="../../assets/omada-mark.svg" style={{ width: 64, opacity: 0.5, marginBottom: 16 }}/>
      <div style={{ fontSize: 18, fontWeight: 600, color: 'var(--fg-secondary)', marginBottom: 6 }}>
        {screen.charAt(0).toUpperCase() + screen.slice(1)}
      </div>
      <div style={{ fontSize: 13, maxWidth: 320, lineHeight: 1.5 }}>
        Not in this UI kit. The Omada console has 30+ screens; this kit ships Dashboard, Devices and Login as reference implementations.
      </div>
      <div style={{ marginTop: 18 }}>
        <Button variant="outline" onClick={() => {
          const el = document.querySelector('.sidebar .navitem');
          if (el) el.click();
        }}>Back to Dashboard</Button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
